<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gratitude App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            font-family: Arial, sans-serif;
        }
        .gratitude-inputs {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }
        .gratitude-input {
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .progress-bar {
            width: 100%;
            background-color: #f3f3f3;
        }
        .progress {
            height: 30px;
            width: 0;
            background-color: #4caf50;
            text-align: center;
            line-height: 30px;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Дневник благодарности</h1>
    <div class="gratitude-inputs">
        <input type="text" class="gratitude-input" placeholder="Введите ваш уровень благодарности 1-10">
        <input type="text" class="gratitude-input" placeholder="Что вы благодарны?">
        <input type="text" class="gratitude-input" placeholder="Напишите историю вашего опыта">
    </div>
    <button onclick="saveGratitude()">Сохранить благодарность</button>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <h2>История</h2>
    <div id="history"></div>
    <script>
        function saveGratitude() {
            const level = document.querySelector('.gratitude-input:nth-child(1)').value;
            const gratitude = document.querySelector('.gratitude-input:nth-child(2)').value;
            const story = document.querySelector('.gratitude-input:nth-child(3)').value;
            const gratitudeList = JSON.parse(localStorage.getItem('gratitudeList')) || [];
            gratitudeList.push({ level, gratitude, story });
            localStorage.setItem('gratitudeList', JSON.stringify(gratitudeList));
            displayHistory();
            updateProgress();
            triggerConfetti();
        }
        function displayHistory() {
            const historyDiv = document.getElementById('history');
            const gratitudeList = JSON.parse(localStorage.getItem('gratitudeList')) || [];
            historyDiv.innerHTML = gratitudeList.map(g => `<p>Уровень: ${g.level}, Благодарность: ${g.gratitude}, История: ${g.story}</p>`).join('');
        }
        function updateProgress() {
            const progressDiv = document.getElementById('progress');
            const gratitudeList = JSON.parse(localStorage.getItem('gratitudeList')) || [];
            const progressPercentage = (gratitudeList.length / 10) * 100;
            progressDiv.style.width = progressPercentage + '%';
            progressDiv.textContent = Math.round(progressPercentage) + '%';
        }
        function triggerConfetti() {
            // This function should implement a confetti effect
            alert('Конфетти!'); // Placeholder for confetti logic
        }
        window.onload = displayHistory;
    </script>
</body>
</html>
